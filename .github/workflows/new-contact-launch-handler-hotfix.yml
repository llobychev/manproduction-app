name: New contact launch handler hotfix

on:
  push:
    branches:
      - fix/new-contact-launch-handler

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/new-contact-launch-handler
          fetch-depth: 0

      - name: Patch launch lifecycle
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old = "if(saved&&saved.first){applyUserData(saved);loadAllData();launchApp();}"
          new = "if(saved&&saved.first){applyUserData(saved);loadAllData();launchApp();setTimeout(handleStartParam,0);}"
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('Expected launchApp boot sequence not found')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate launch handler flow
        run: |
          grep -F "launchApp();setTimeout(handleStartParam,0);" index.html
          grep -F "if(pendingStartParam==='new_contact')" index.html
          grep -F "switchTab('net');" index.html
          grep -F "openContactModal();" index.html

      - name: Validate embedded JavaScript syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = []
          for attrs, body in re.findall(r'<script([^>]*)>(.*?)</script>', html, flags=re.S | re.I):
              if 'src=' not in attrs.lower():
                  scripts.append(body)
          Path('/tmp/manclub-inline.js').write_text('\n'.join(scripts), encoding='utf-8')
          PY
          node --check /tmp/manclub-inline.js

      - name: Commit generated hotfix
        run: |
          if git diff --quiet -- index.html; then
            echo 'No index.html changes required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'fix: run new contact deeplink after app launch'
          git push origin HEAD:fix/new-contact-launch-handler

name: Migrate Main App auth endpoint

on:
  push:
    branches:
      - security/use-app-auth-endpoint
    paths:
      - .github/workflows/migrate-auth-endpoint.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: security/use-app-auth-endpoint
          fetch-depth: 0

      - name: Replace legacy auth endpoint
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = "xhr.open('POST',AUTH_SERVER+'/auth',true);"
          new = "xhr.open('POST',AUTH_SERVER+'/auth/app',true);"

          count = text.count(old)
          if count != 1:
              raise SystemExit(f'Expected exactly one legacy auth endpoint, found {count}')

          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Verify migration
        shell: bash
        run: |
          set -euo pipefail
          grep -F "xhr.open('POST',AUTH_SERVER+'/auth/app',true);" index.html
          if grep -F "xhr.open('POST',AUTH_SERVER+'/auth',true);" index.html; then
            echo 'Legacy auth endpoint is still present' >&2
            exit 1
          fi

      - name: Commit migration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'security: use dedicated Main App auth endpoint'
          git push origin HEAD:security/use-app-auth-endpoint
